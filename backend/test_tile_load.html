<!DOCTYPE html>
<html>
<head>
    <title>NDVI Tile Test</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
</head>
<body>
    <div id="map" style="width: 100%; height: 100vh;"></div>
    <div style="position: absolute; top: 10px; right: 10px; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000;">
        <h4>NDVI Tile Test</h4>
        <div id="status">Loading...</div>
        <button onclick="testTile()">Test Tile Load</button>
    </div>
    
    <script>
        // Create map centered on Harare
        var map = L.map('map').setView([-17.85, 31.05], 12);
        
        // Add base layer
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // Test NDVI layers with the corrected URLs
        var ndviBefore = L.tileLayer('https://earthengine.googleapis.com/v1/projects/trans-scheme-463112-q8/maps/b525432bc1fb4cad4cb1c2344c10285d-21eede5b391f25bbcdc08862c0496511/tiles/{z}/{x}/{y}', {
            attribution: 'Google Earth Engine - NDVI Before',
            opacity: 0.7
        });
        
        var ndviAfter = L.tileLayer('https://earthengine.googleapis.com/v1/projects/trans-scheme-463112-q8/maps/0ebda117cf572efbbe32421699dce3b1-fffded86e3f11ffd9730e6738cdb53cc/tiles/{z}/{x}/{y}', {
            attribution: 'Google Earth Engine - NDVI After',
            opacity: 0.7
        });
        
        var ndviChange = L.tileLayer('https://earthengine.googleapis.com/v1/projects/trans-scheme-463112-q8/maps/5a1d7fe4ce6c15ca91c32773ba40ccfb-dd7cdc1f66801e168ce317275b586ad6/tiles/{z}/{x}/{y}', {
            attribution: 'Google Earth Engine - NDVI Change',
            opacity: 0.8
        });
        
        // Layer control
        var baseLayers = {
            "OpenStreetMap": osm
        };
        
        var overlays = {
            "NDVI Before": ndviBefore,
            "NDVI After": ndviAfter,
            "NDVI Change (Red=Deforestation)": ndviChange
        };
        
        L.control.layers(baseLayers, overlays).addTo(map);
        
        // Status tracking
        var loadedCount = 0;
        var errorCount = 0;
        
        function updateStatus() {
            document.getElementById('status').innerHTML = 
                `Loaded: ${loadedCount}, Errors: ${errorCount}`;
        }
        
        // Add error and load handlers to all NDVI layers
        [ndviBefore, ndviAfter, ndviChange].forEach((layer, index) => {
            const layerNames = ['Before', 'After', 'Change'];
            
            layer.on('tileerror', function(e) {
                errorCount++;
                console.error(`NDVI ${layerNames[index]} tile error:`, e.tile.src);
                updateStatus();
            });
            
            layer.on('tileload', function(e) {
                loadedCount++;
                console.log(`NDVI ${layerNames[index]} tile loaded:`, e.tile.src);
                updateStatus();
            });
        });
        
        function testTile() {
            // Test a specific tile URL
            var testUrl = 'https://earthengine.googleapis.com/v1/projects/trans-scheme-463112-q8/maps/b525432bc1fb4cad4cb1c2344c10285d-21eede5b391f25bbcdc08862c0496511/tiles/12/2048/2048';
            
            var img = new Image();
            img.onload = function() {
                alert('Test tile loaded successfully!');
            };
            img.onerror = function() {
                alert('Test tile failed to load');
            };
            img.src = testUrl;
        }
        
        updateStatus();
    </script>
</body>
</html>
